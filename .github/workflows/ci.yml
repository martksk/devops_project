name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------
  # 1. TESTING JOBS
  # ----------------------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Tests
        run: npm run test
        working-directory: ./backend

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run Tests
        run: npm run test
        working-directory: ./frontend

  # ----------------------------------------------------
  # 2. DEPLOYMENT JOBS (CI/CD)
  # ----------------------------------------------------
  deploy-backend:
    name: Deploy Backend to Render
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering Render redeployment..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Redeployment triggered successfully!"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: test-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # A) Deploy Preview (runs on PRs)
      - name: Deploy Preview to Vercel
        if: github.event_name == 'pull_request'
        run: npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }} -y
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # B) Deploy Production (runs on merges to main)
      - name: Deploy Production to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} -y
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
